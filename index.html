<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小区业主反馈平台</title>
<style>
  :root {
    --primary: #1a73e8;
    --danger: #d93025;
    --success: #0d904f;
    --bg: #f5f5f5;
    --card: #fff;
    --text: #202124;
    --text-secondary: #5f6368;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }

  /* ========== 顶部导航 ========== */
  .nav {
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 4px rgba(0,0,0,.15);
  }
  .nav h1 { font-size: 18px; font-weight: 600; }
  .nav-btn {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .nav-btn:active { background: rgba(255,255,255,.35); }

  /* ========== 页面容器 ========== */
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ========== 卡片 ========== */
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2 {
    font-size: 17px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ========== 表单 ========== */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: #fafafa;
    transition: border-color .2s;
  }
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
  }
  .form-group textarea { resize: vertical; min-height: 100px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .2s;
    background: #fafafa;
  }
  .upload-zone:active { background: #e8f0fe; border-color: var(--primary); }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone .hint { font-size: 13px; color: #999; margin-top: 4px; }
  .upload-zone input { display: none; }

  .preview-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-item img, .preview-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .preview-item .del {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 22px;
    height: 22px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-item.video-item::after {
    content: "▶";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.3);
    color: #fff;
    font-size: 24px;
  }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:active { background: #1557b0; }
  .btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #323232;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--success); }

  /* ========== 管理端 ========== */
  .login-box { max-width: 320px; margin: 60px auto; }
  .login-box input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    text-align: center;
    letter-spacing: 2px;
  }
  .login-box input:focus { outline: none; border-color: var(--primary); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .cat-bar { margin-bottom: 8px; }
  .cat-bar .cat-name { font-size: 13px; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .cat-bar .bar {
    height: 8px;
    border-radius: 4px;
    background: #e8e8e8;
    overflow: hidden;
  }
  .cat-bar .bar .fill {
    height: 100%;
    border-radius: 4px;
    background: var(--primary);
    transition: width .5s;
  }

  .feedback-item {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--primary);
  }
  .feedback-item .meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .feedback-item .meta .tag {
    background: #e8f0fe;
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  .feedback-item .content { font-size: 14px; margin-bottom: 8px; white-space: pre-wrap; }
  .feedback-item .files { display: flex; flex-wrap: wrap; gap: 6px; }
  .feedback-item .files img,
  .feedback-item .files video {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .admin-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .admin-actions button {
    flex: 1;
    min-width: 100px;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
  }
  .admin-actions button:active { background: #f0f0f0; }
  .admin-actions .btn-danger { border-color: var(--danger); color: var(--danger); }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .filter-bar select, .filter-bar input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-overlay img, .modal-overlay video {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .export-area {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }

  /* ========== 提示页面 ========== */
  .welcome-badge {
    text-align: center;
    padding: 10px 16px;
    background: #e8f5e9;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #2e7d32;
  }
  .welcome-badge .icon { margin-right: 4px; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="nav">
  <h1 id="navTitle">🏠 业主反馈平台</h1>
  <button class="nav-btn" id="navToggle" onclick="toggleAdmin()">🔑 管理</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 图片/视频预览弹窗 -->
<div class="modal-overlay hidden" id="mediaModal" onclick="closeMedia()">
  <div id="mediaContent"></div>
</div>

<!-- ==================== 业主提交页 ==================== -->
<div class="container page active" id="pageSubmit">
  <div class="welcome-badge">
    🛡️ 本平台为<strong>匿名提交</strong>，您的身份不会被记录。提交内容仅管理员可见，不会公开。
  </div>

  <div class="card">
    <h2>📝 提交反馈</h2>

    <div class="form-group">
      <label>问题分类 *</label>
      <select id="category">
        <option value="">请选择分类</option>
        <option value="安保问题">🔒 安保问题</option>
        <option value="环境卫生">🧹 环境卫生</option>
        <option value="设施维修">🔧 设施维修</option>
        <option value="噪音扰民">🔊 噪音扰民</option>
        <option value="停车管理">🚗 停车管理</option>
        <option value="绿化养护">🌿 绿化养护</option>
        <option value="电梯问题">🛗 电梯问题</option>
        <option value="收费问题">💰 收费问题</option>
        <option value="其他">📌 其他</option>
      </select>
    </div>

    <div class="form-group">
      <label>问题描述 *</label>
      <textarea id="description" placeholder="请详细描述您遇到的问题，包括时间、地点、具体情况等..."></textarea>
    </div>

    <div class="form-group">
      <label>上传证据（图片/视频，选填）</label>
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📷</div>
        <div>点击上传图片或视频</div>
        <div class="hint">支持 JPG/PNG/MP4，单文件最大 50MB</div>
      </div>
      <input type="file" id="fileInput" accept="image/*,video/mp4,video/quicktime" multiple onchange="handleFiles(event)">
      <div class="preview-list" id="previewList"></div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitFeedback()">✅ 匿名提交反馈</button>
  </div>
</div>

<!-- ==================== 管理端 ==================== -->
<div class="container page" id="pageAdmin">

  <!-- 登录 -->
  <div id="loginSection">
    <div class="login-box card">
      <h2 style="text-align:center;margin-bottom:16px;">🔐 管理员登录</h2>
      <div class="form-group">
        <input type="password" id="adminPassword" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">进入管理后台</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-secondary);">
        默认密码：admin888，登录后可修改
      </div>
    </div>
  </div>

  <!-- 管理面板 -->
  <div id="adminPanel" style="display:none;">

    <!-- 统计 -->
    <div class="stat-grid" id="statGrid"></div>

    <!-- 分类分布 -->
    <div class="card">
      <h2>📊 分类分布</h2>
      <div id="categoryChart"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="admin-actions">
      <button onclick="exportReport()">📄 导出月度报告</button>
      <button onclick="exportData()">💾 备份全部数据</button>
      <button onclick="document.getElementById('restoreInput').click()">📥 恢复数据</button>
      <button class="btn-danger" onclick="clearAll()">🗑 清空全部</button>
    </div>
    <div class="admin-actions">
      <button onclick="showChangePassword()">🔑 修改管理密码</button>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="changePwdSection" style="display:none;" class="card">
      <h2>🔑 修改管理密码</h2>
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="oldPassword" placeholder="输入当前密码">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" placeholder="输入新密码（至少4位）">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入新密码">
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="changePassword()">✅ 确认修改</button>
        <button class="btn" onclick="document.getElementById('changePwdSection').style.display='none'">取消</button>
      </div>
    </div>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(event)">

    <!-- 筛选 -->
    <div class="filter-bar">
      <select id="filterCategory" onchange="renderFeedbackList()">
        <option value="">全部分类</option>
      </select>
      <input type="month" id="filterMonth" onchange="renderFeedbackList()" style="flex:0 0 140px;">
    </div>

    <!-- 反馈列表 -->
    <div id="feedbackList"></div>
  </div>
</div>

<!-- ==================== 报告导出页 ==================== -->
<div class="container page" id="pageReport">
  <div class="card">
    <h2>📊 月度报告预览</h2>
    <div class="export-area" id="reportContent"></div>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button class="btn btn-primary" onclick="copyReport()">📋 复制报告文本</button>
      <button class="btn" style="background:#34a853;color:#fff;" onclick="downloadReport()">📥 下载报告文件</button>
      <button class="btn" onclick="showPage('admin')">← 返回管理</button>
    </div>
  </div>
</div>

<script>
// ==================== 全局状态 ====================
const DB_NAME = 'YezhuFeedbackDB';
const DB_VERSION = 1;
const STORE_NAME = 'feedbacks';
const DEFAULT_PASSWORD = 'admin888';

let db = null;
let isAdmin = false;
let uploadedFiles = []; // { name, type, dataUrl }

// ==================== IndexedDB ====================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function addFeedback(feedback) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.add(feedback);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function getAllFeedbacks() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result.sort((a, b) => b.createdAt - a.createdAt));
    req.onerror = () => reject(req.error);
  });
}

function deleteFeedback(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function clearAllFeedbacks() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function importFeedbacks(list) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    let count = 0;
    list.forEach(item => {
      delete item.id; // 重新生成ID
      store.add(item);
      count++;
    });
    tx.oncomplete = () => resolve(count);
    tx.onerror = () => reject(tx.error);
  });
}

// ==================== 工具函数 ====================
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2000);
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDateShort(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

const CATEGORIES = ['安保问题','环境卫生','设施维修','噪音扰民','停车管理','绿化养护','电梯问题','收费问题','其他'];

// ==================== 页面切换 ====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');

  if (name === 'submit') {
    document.getElementById('navTitle').textContent = '🏠 业主反馈平台';
    document.getElementById('navToggle').textContent = '🔑 管理';
    isAdmin = false;
  } else if (name === 'admin') {
    document.getElementById('navTitle').textContent = '🔐 管理后台';
    document.getElementById('navToggle').textContent = '📝 提交';
    if (isAdmin) renderAdminPanel();
  } else if (name === 'report') {
    document.getElementById('navTitle').textContent = '📊 月度报告';
    document.getElementById('navToggle').textContent = '📝 提交';
  }
}

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    showPage('submit');
  } else {
    showPage('admin');
  }
}

// ==================== 文件处理 ====================
function handleFiles(event) {
  const files = Array.from(event.target.files);
  const MAX_SIZE = 50 * 1024 * 1024; // 50MB

  files.forEach(file => {
    if (file.size > MAX_SIZE) {
      showToast(`文件 ${file.name} 超过50MB限制，已跳过`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFiles.push({
        name: file.name,
        type: file.type,
        dataUrl: e.target.result
      });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderPreviews() {
  const container = document.getElementById('previewList');
  container.innerHTML = uploadedFiles.map((f, i) => `
    <div class="preview-item ${f.type.startsWith('video/') ? 'video-item' : ''}">
      ${f.type.startsWith('video/')
        ? `<video src="${f.dataUrl}" muted></video>`
        : `<img src="${f.dataUrl}" alt="${f.name}">`}
      <button class="del" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderPreviews();
}

// ==================== 提交反馈 ====================
async function submitFeedback() {
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value.trim();

  if (!category) { showToast('请选择问题分类'); return; }
  if (!description) { showToast('请填写问题描述'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    await addFeedback({
      category,
      description,
      files: uploadedFiles.map(f => ({ name: f.name, type: f.type, dataUrl: f.dataUrl })),
      createdAt: Date.now()
    });

    // 重置表单
    document.getElementById('category').value = '';
    document.getElementById('description').value = '';
    uploadedFiles = [];
    renderPreviews();

    showToast('✅ 反馈提交成功，感谢您的参与！', 'success');
  } catch (err) {
    showToast('提交失败，请重试');
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = '✅ 匿名提交反馈';
}

// ==================== 管理登录 ====================
function adminLogin() {
  const pwd = document.getElementById('adminPassword').value.trim();
  // 检查是否有自定义密码
  const savedPwd = localStorage.getItem('admin_password') || DEFAULT_PASSWORD;
  if (pwd === savedPwd) {
    isAdmin = true;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('navTitle').textContent = '🔐 管理后台';
    document.getElementById('navToggle').textContent = '📝 提交';
    document.getElementById('adminPassword').value = '';
    renderAdminPanel();
  } else {
    showToast('密码错误');
  }
}

function showChangePassword() {
  const section = document.getElementById('changePwdSection');
  section.style.display = section.style.display === 'none' ? 'block' : 'none';
  document.getElementById('oldPassword').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('confirmPassword').value = '';
}

function changePassword() {
  const oldPwd = document.getElementById('oldPassword').value.trim();
  const newPwd = document.getElementById('newPassword').value.trim();
  const confirmPwd = document.getElementById('confirmPassword').value.trim();
  const savedPwd = localStorage.getItem('admin_password') || DEFAULT_PASSWORD;

  if (oldPwd !== savedPwd) {
    showToast('当前密码错误');
    return;
  }
  if (newPwd.length < 4) {
    showToast('新密码至少4位');
    return;
  }
  if (newPwd !== confirmPwd) {
    showToast('两次输入的新密码不一致');
    return;
  }

  localStorage.setItem('admin_password', newPwd);
  document.getElementById('changePwdSection').style.display = 'none';
  showToast('✅ 密码修改成功！请牢记新密码', 'success');
}

// ==================== 管理面板 ====================
async function renderAdminPanel() {
  const feedbacks = await getAllFeedbacks();

  // 统计
  const total = feedbacks.length;
  const thisMonth = feedbacks.filter(f => {
    const d = new Date(f.createdAt);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  // 分类统计
  const catCount = {};
  CATEGORIES.forEach(c => catCount[c] = 0);
  feedbacks.forEach(f => { catCount[f.category] = (catCount[f.category] || 0) + 1; });

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card">
      <div class="num">${total}</div>
      <div class="label">累计反馈</div>
    </div>
    <div class="stat-card">
      <div class="num">${thisMonth}</div>
      <div class="label">本月新增</div>
    </div>
  `;

  // 分类柱状图
  const maxCount = Math.max(1, ...Object.values(catCount));
  document.getElementById('categoryChart').innerHTML = CATEGORIES.map(c => `
    <div class="cat-bar">
      <div class="cat-name"><span>${c}</span><span>${catCount[c]}条</span></div>
      <div class="bar"><div class="fill" style="width:${(catCount[c]/maxCount*100)}%"></div></div>
    </div>
  `).join('');

  // 筛选下拉
  const filterCat = document.getElementById('filterCategory');
  filterCat.innerHTML = '<option value="">全部分类</option>' +
    CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

  renderFeedbackList();
}

async function renderFeedbackList() {
  let feedbacks = await getAllFeedbacks();

  const filterCat = document.getElementById('filterCategory').value;
  const filterMonth = document.getElementById('filterMonth').value;

  if (filterCat) feedbacks = feedbacks.filter(f => f.category === filterCat);
  if (filterMonth) {
    feedbacks = feedbacks.filter(f => formatDateShort(f.createdAt) === filterMonth);
  }

  const list = document.getElementById('feedbackList');
  if (feedbacks.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无反馈记录</div></div>';
    return;
  }

  list.innerHTML = feedbacks.map(f => `
    <div class="feedback-item">
      <div class="meta">
        <span>#${f.id} · ${formatDate(f.createdAt)}</span>
        <span class="tag">${f.category}</span>
      </div>
      <div class="content">${escapeHtml(f.description)}</div>
      ${f.files && f.files.length > 0 ? `
        <div class="files">
          ${f.files.map((file, i) =>
            file.type.startsWith('video/')
              ? `<video src="${file.dataUrl}" muted onclick="openMedia('${file.dataUrl}','video')"></video>`
              : `<img src="${file.dataUrl}" alt="${file.name}" onclick="openMedia('${file.dataUrl}','image')">`
          ).join('')}
        </div>
      ` : ''}
      <div style="margin-top:8px;">
        <button style="font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;" onclick="deleteFeedbackItem(${f.id})">🗑 删除此条</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function deleteFeedbackItem(id) {
  if (!confirm('确定删除这条反馈？此操作不可撤销。')) return;
  await deleteFeedback(id);
  showToast('已删除');
  renderAdminPanel();
}

async function clearAll() {
  if (!confirm('⚠️ 确定清空全部反馈数据？\n\n建议先导出备份！')) return;
  if (!confirm('再次确认：真的要清空全部数据吗？')) return;
  await clearAllFeedbacks();
  showToast('已清空全部数据');
  renderAdminPanel();
}

// ==================== 媒体预览 ====================
function openMedia(dataUrl, type) {
  const modal = document.getElementById('mediaModal');
  const content = document.getElementById('mediaContent');
  content.innerHTML = type === 'video'
    ? `<video src="${dataUrl}" controls autoplay style="max-width:100%;max-height:80vh;"></video>`
    : `<img src="${dataUrl}" style="max-width:100%;max-height:80vh;">`;
  modal.classList.remove('hidden');
}

function closeMedia() {
  document.getElementById('mediaModal').classList.add('hidden');
  document.getElementById('mediaContent').innerHTML = '';
}

// ==================== 导出报告 ====================
async function exportReport() {
  const feedbacks = await getAllFeedbacks();
  const now = new Date();
  const monthStr = `${now.getFullYear()}年${now.getMonth()+1}月`;
  const thisMonth = feedbacks.filter(f => {
    const d = new Date(f.createdAt);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  const catCount = {};
  CATEGORIES.forEach(c => catCount[c] = 0);
  thisMonth.forEach(f => { catCount[f.category] = (catCount[f.category] || 0) + 1; });

  let report = `═══════════════════════════
  小区物业问题反馈月度报告
  ${monthStr}
═══════════════════════════

📊 本月统计
───────────────────────────
  累计反馈总数：${feedbacks.length} 条
  本月新增：${thisMonth.length} 条
───────────────────────────

📈 分类分布
───────────────────────────
`;

  CATEGORIES.forEach(c => {
    const bar = '█'.repeat(Math.round(catCount[c] / Math.max(1, ...Object.values(catCount)) * 20));
    report += `  ${c.padEnd(8, '　')} ${bar} ${catCount[c]}条\n`;
  });

  report += `
───────────────────────────

📋 本月反馈详情
───────────────────────────
`;

  if (thisMonth.length === 0) {
    report += '  本月暂无反馈。\n';
  } else {
    thisMonth.forEach((f, i) => {
      report += `
【${i+1}】${f.category} · ${formatDate(f.createdAt)}
  ${f.description}
  ${f.files && f.files.length > 0 ? `  📎 附件：${f.files.length}个文件` : '  📎 无附件'}
`;
    });
  }

  report += `
───────────────────────────
  报告生成时间：${formatDate(Date.now())}
  本报告由小区业主反馈平台自动生成
  数据来源：全体业主匿名提交
═══════════════════════════
`;

  document.getElementById('reportContent').textContent = report;
  showPage('report');
}

function copyReport() {
  const text = document.getElementById('reportContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ 报告已复制到剪贴板', 'success');
  }).catch(() => {
    showToast('复制失败，请手动选择复制');
  });
}

function downloadReport() {
  const text = document.getElementById('reportContent').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  a.href = url;
  a.download = `物业反馈报告_${now.getFullYear()}_${now.getMonth()+1}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 报告已下载', 'success');
}

// ==================== 数据备份/恢复 ====================
async function exportData() {
  const feedbacks = await getAllFeedbacks();
  const data = {
    version: 1,
    exportedAt: Date.now(),
    exportedAtStr: formatDate(Date.now()),
    total: feedbacks.length,
    feedbacks: feedbacks
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `业主反馈数据备份_${formatDateShort(Date.now())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ 已备份 ${feedbacks.length} 条数据`, 'success');
}

async function restoreData(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!confirm('⚠️ 恢复数据将覆盖当前所有数据，确定继续？')) {
    event.target.value = '';
    return;
  }

  try {
    const text = await file.text();
    const data = JSON.parse(text);

    if (!data.feedbacks || !Array.isArray(data.feedbacks)) {
      throw new Error('数据格式不正确');
    }

    await clearAllFeedbacks();
    const count = await importFeedbacks(data.feedbacks);
    showToast(`✅ 已恢复 ${count} 条数据`, 'success');
    renderAdminPanel();
  } catch (err) {
    showToast('恢复失败：数据格式不正确');
    console.error(err);
  }

  event.target.value = '';
}

// ==================== 初始化 ====================
async function init() {
  try {
    await openDB();
    console.log('数据库初始化成功');
  } catch (err) {
    console.error('数据库初始化失败', err);
    showToast('初始化失败，请刷新页面重试');
  }

  // 检查是否有自定义密码
  if (!localStorage.getItem('admin_password')) {
    localStorage.setItem('admin_password', DEFAULT_PASSWORD);
  }
}

init();
</script>
