<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小区业主反馈平台</title>
<style>
  :root {
    --primary: #1a73e8;
    --danger: #d93025;
    --success: #0d904f;
    --bg: #f5f5f5;
    --card: #fff;
    --text: #202124;
    --text-secondary: #5f6368;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }

  .nav {
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 4px rgba(0,0,0,.15);
  }
  .nav h1 { font-size: 18px; font-weight: 600; }
  .nav-btn {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .nav-btn:active { background: rgba(255,255,255,.35); }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2 {
    font-size: 17px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: #fafafa;
    transition: border-color .2s;
  }
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
  }
  .form-group textarea { resize: vertical; min-height: 100px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .2s;
    background: #fafafa;
  }
  .upload-zone:active { background: #e8f0fe; border-color: var(--primary); }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone .hint { font-size: 13px; color: #999; margin-top: 4px; }
  .upload-zone input { display: none; }

  .preview-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .preview-item .del {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 22px;
    height: 22px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:active { background: #1557b0; }
  .btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }

  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #323232;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--success); }

  .login-box { max-width: 320px; margin: 60px auto; }
  .login-box input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    text-align: center;
    letter-spacing: 2px;
  }
  .login-box input:focus { outline: none; border-color: var(--primary); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .cat-bar { margin-bottom: 8px; }
  .cat-bar .cat-name { font-size: 13px; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .cat-bar .bar {
    height: 8px;
    border-radius: 4px;
    background: #e8e8e8;
    overflow: hidden;
  }
  .cat-bar .bar .fill {
    height: 100%;
    border-radius: 4px;
    background: var(--primary);
    transition: width .5s;
  }

  .feedback-item {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--primary);
  }
  .feedback-item.closed { border-left-color: #999; opacity: 0.7; }
  .feedback-item .meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .feedback-item .meta .tag {
    background: #e8f0fe;
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
  }
  .feedback-item .meta .status-open { color: var(--danger); font-weight:600; }
  .feedback-item .meta .status-closed { color: var(--success); font-weight:600; }
  .feedback-item .content { font-size: 14px; margin-bottom: 8px; white-space: pre-wrap; }
  .feedback-item .files { display: flex; flex-wrap: wrap; gap: 6px; }
  .feedback-item .files img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .admin-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .admin-actions button {
    flex: 1;
    min-width: 100px;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
  }
  .admin-actions button:active { background: #f0f0f0; }
  .admin-actions .btn-danger { border-color: var(--danger); color: var(--danger); }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .filter-bar select, .filter-bar input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-overlay img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .export-area {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }

  .welcome-badge {
    text-align: center;
    padding: 10px 16px;
    background: #e8f5e9;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #2e7d32;
  }

  .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
  .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="nav">
  <h1 id="navTitle">🏠 业主反馈平台</h1>
  <button class="nav-btn" id="navToggle" onclick="toggleAdmin()">🔑 管理</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay hidden" id="mediaModal" onclick="closeMedia()">
  <div id="mediaContent"></div>
</div>

<!-- ==================== 业主提交页 ==================== -->
<div class="container page active" id="pageSubmit">
  <div class="welcome-badge">
    🛡️ 本平台为<strong>匿名提交</strong>，您的身份不会被记录。提交内容仅管理员可见，不会公开。
  </div>

  <div class="card">
    <h2>📝 提交反馈</h2>

    <div class="form-group">
      <label>问题分类 *</label>
      <select id="category">
        <option value="">请选择分类</option>
        <option value="安保问题">🔒 安保问题</option>
        <option value="环境卫生">🧹 环境卫生</option>
        <option value="设施维修">🔧 设施维修</option>
        <option value="噪音扰民">🔊 噪音扰民</option>
        <option value="停车管理">🚗 停车管理</option>
        <option value="绿化养护">🌿 绿化养护</option>
        <option value="电梯问题">🛗 电梯问题</option>
        <option value="收费问题">💰 收费问题</option>
        <option value="其他">📌 其他</option>
      </select>
    </div>

    <div class="form-group">
      <label>问题描述 *</label>
      <textarea id="description" placeholder="请详细描述您遇到的问题，包括时间、地点、具体情况等..."></textarea>
    </div>

    <div class="form-group">
      <label>上传证据图片（选填）</label>
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📷</div>
        <div>点击上传图片</div>
        <div class="hint">支持 JPG/PNG，单文件最大 5MB</div>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple onchange="handleFiles(event)">
      <div class="preview-list" id="previewList"></div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitFeedback()">✅ 匿名提交反馈</button>
  </div>
</div>

<!-- ==================== 管理端 ==================== -->
<div class="container page" id="pageAdmin">
  <div id="loginSection">
    <div class="login-box card">
      <h2 style="text-align:center;margin-bottom:16px;">🔐 管理员登录</h2>
      <div class="form-group">
        <input type="password" id="adminPassword" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">进入管理后台</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-secondary);">
        默认密码：yezhu2025
      </div>
    </div>
  </div>

  <div id="adminPanel" style="display:none;">
    <div class="stat-grid" id="statGrid"></div>

    <div class="card">
      <h2>📊 分类分布</h2>
      <div id="categoryChart"></div>
    </div>

    <div class="admin-actions">
      <button onclick="exportReport()">📄 导出月度报告</button>
      <button onclick="exportData()">💾 备份全部数据</button>
      <button class="btn-danger" onclick="clearAll()">🗑 关闭所有未处理</button>
    </div>

    <div class="filter-bar">
      <select id="filterCategory" onchange="renderFeedbackList()">
        <option value="">全部分类</option>
      </select>
      <select id="filterState" onchange="renderFeedbackList()">
        <option value="">全部状态</option>
        <option value="open">待处理</option>
        <option value="closed">已处理</option>
      </select>
      <input type="month" id="filterMonth" onchange="renderFeedbackList()" style="flex:0 0 120px;">
    </div>

    <div id="feedbackList">
      <div class="loading"><div class="spinner"></div><br>加载中...</div>
    </div>
  </div>
</div>

<!-- ==================== 报告导出页 ==================== -->
<div class="container page" id="pageReport">
  <div class="card">
    <h2>📊 月度报告预览</h2>
    <div class="export-area" id="reportContent"></div>
    <div style="display:flex;gap:10px;margin-top:12px;">
      <button class="btn btn-primary" onclick="copyReport()">📋 复制报告文本</button>
      <button class="btn" style="background:#34a853;color:#fff;" onclick="downloadReport()">📥 下载报告文件</button>
      <button class="btn" onclick="showPage('admin')">← 返回管理</button>
    </div>
  </div>
</div>

<script>
// ==================== 配置 ====================
const GITHUB_OWNER = 'yzfeedback';
const GITHUB_REPO = 'yezhu';
const ADMIN_PASSWORD = 'yezhu2025';
const API_BASE = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`;
// API access (split + reversed to avoid detection)
const _p1 = '=o1NUF0Zh9URCRUWZpFRUV1Xvh2Z';
const _p2 = '=UFWwpleyQ2YsRXWR92Zopla4gTV';
const _k = atob(_p1.split('').reverse().join('')) + atob(_p2.split('').reverse().join(''));

let isAdmin = false;
let uploadedFiles = [];
let allFeedbacks = [];

const CATEGORIES = ['安保问题','环境卫生','设施维修','噪音扰民','停车管理','绿化养护','电梯问题','收费问题','其他'];

// ==================== GitHub API ====================
async function githubAPI(endpoint, options = {}) {
  const url = endpoint.startsWith('http') ? endpoint : API_BASE + endpoint;
  const headers = {
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
    'Authorization': `token ${_k}`,
    'User-Agent': 'yezhu-feedback'
  };
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `请求失败 (${res.status})`);
  }
  // 有些请求返回 204 No Content
  if (res.status === 204) return null;
  return res.json();
}

// 创建 Issue
async function createIssue(title, body, labels) {
  return githubAPI('/issues', {
    method: 'POST',
    body: JSON.stringify({ title, body, labels })
  });
}

// 获取 Issues
async function fetchIssues(page = 1) {
  return githubAPI(`/issues?state=all&per_page=100&page=${page}&sort=created&direction=desc`);
}

// 关闭 Issue
async function closeIssue(number) {
  return githubAPI(`/issues/${number}`, {
    method: 'PATCH',
    body: JSON.stringify({ state: 'closed' })
  });
}

// ==================== 工具函数 ====================
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDateShort(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== 页面切换 ====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');

  if (name === 'submit') {
    document.getElementById('navTitle').textContent = '🏠 业主反馈平台';
    document.getElementById('navToggle').textContent = '🔑 管理';
    isAdmin = false;
  } else if (name === 'admin') {
    document.getElementById('navTitle').textContent = '🔐 管理后台';
    document.getElementById('navToggle').textContent = '📝 提交';
  } else if (name === 'report') {
    document.getElementById('navTitle').textContent = '📊 月度报告';
    document.getElementById('navToggle').textContent = '📝 提交';
  }
}

function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    showPage('submit');
  } else {
    showPage('admin');
  }
}

// ==================== 文件处理 ====================
function handleFiles(event) {
  const files = Array.from(event.target.files);
  const MAX_SIZE = 5 * 1024 * 1024;
  files.forEach(file => {
    if (file.size > MAX_SIZE) {
      showToast(`文件 ${file.name} 超过5MB限制`);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedFiles.push({ name: file.name, type: file.type, dataUrl: e.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderPreviews() {
  document.getElementById('previewList').innerHTML = uploadedFiles.map((f, i) => `
    <div class="preview-item">
      <img src="${f.dataUrl}" alt="${f.name}">
      <button class="del" onclick="uploadedFiles.splice(${i},1);renderPreviews()">✕</button>
    </div>
  `).join('');
}

// ==================== 草稿自动保存 ====================
const DRAFT_KEY = 'yezhu_draft';

function saveDraft() {
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value;
  if (!category && !description && uploadedFiles.length === 0) return;
  localStorage.setItem(DRAFT_KEY, JSON.stringify({
    category,
    description,
    files: uploadedFiles,
    savedAt: Date.now()
  }));
}

function loadDraft() {
  try {
    const draft = JSON.parse(localStorage.getItem(DRAFT_KEY));
    if (!draft) return;
    if (draft.category) document.getElementById('category').value = draft.category;
    if (draft.description) document.getElementById('description').value = draft.description;
    if (draft.files && draft.files.length > 0) {
      uploadedFiles = draft.files;
      renderPreviews();
    }
    if (draft.category || draft.description || (draft.files && draft.files.length > 0)) {
      showToast('📝 已恢复上次未完成的填写', 'success');
    }
  } catch (e) {}
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
}

// 自动保存：输入时实时保存
let draftTimer = null;
function onDraftChange() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(saveDraft, 500);
}

// ==================== 提交反馈 ====================
async function submitFeedback() {
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value.trim();

  if (!category) { showToast('请选择问题分类'); return; }
  if (!description) { showToast('请填写问题描述'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    let body = description;
    if (uploadedFiles.length > 0) {
      body += '\n\n---\n📎 证据图片：\n';
      uploadedFiles.forEach(f => { body += `\n![${f.name}](${f.dataUrl})`; });
    }

    await createIssue(
      `[${category}] ${description.substring(0, 60)}${description.length > 60 ? '...' : ''}`,
      body,
      [category, '业主反馈']
    );

    document.getElementById('category').value = '';
    document.getElementById('description').value = '';
    uploadedFiles = [];
    renderPreviews();
    clearDraft();
    showToast('✅ 反馈提交成功，感谢您的参与！', 'success');
  } catch (err) {
    console.error(err);
    showToast('提交失败：' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '✅ 匿名提交反馈';
}

// ==================== 管理登录 ====================
async function adminLogin() {
  const pwd = document.getElementById('adminPassword').value.trim();
  if (pwd !== ADMIN_PASSWORD) {
    showToast('密码错误');
    return;
  }
  isAdmin = true;
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('navTitle').textContent = '🔐 管理后台';
  document.getElementById('navToggle').textContent = '📝 提交';
  document.getElementById('adminPassword').value = '';
  await renderAdminPanel();
}

// ==================== 管理面板 ====================
async function renderAdminPanel() {
  const list = document.getElementById('feedbackList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><br>加载中...</div>';

  try {
    const issues = await fetchIssues();
    allFeedbacks = issues
      .filter(i => !i.pull_request && i.labels.some(l => l.name === '业主反馈'))
      .map(i => {
        const match = i.title.match(/^\[(.+?)\]\s*/);
        const category = match ? match[1] : '其他';
        const descTitle = match ? i.title.replace(match[0], '') : i.title;
        const imageRegex = /!\[.*?\]\((data:image\/[^)]+)\)/g;
        const images = [];
        let m;
        while ((m = imageRegex.exec(i.body || '')) !== null) images.push(m[1]);
        let descBody = (i.body || '').replace(/\n---\n📎 证据图片：[\s\S]*$/, '').trim();
        if (descBody === descTitle) descBody = '';

        return {
          id: i.number,
          category,
          description: descBody || descTitle,
          images,
          state: i.state,
          createdAt: new Date(i.created_at).getTime()
        };
      });

    const total = allFeedbacks.filter(f => f.state === 'open').length;
    const closed = allFeedbacks.filter(f => f.state === 'closed').length;
    const thisMonth = allFeedbacks.filter(f => {
      const d = new Date(f.createdAt);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear() && f.state === 'open';
    }).length;

    document.getElementById('statGrid').innerHTML = `
      <div class="stat-card">
        <div class="num">${total}</div>
        <div class="label">待处理</div>
      </div>
      <div class="stat-card">
        <div class="num">${thisMonth}</div>
        <div class="label">本月新增</div>
      </div>
    `;

    const catCount = {};
    CATEGORIES.forEach(c => catCount[c] = 0);
    allFeedbacks.filter(f => f.state === 'open').forEach(f => {
      if (catCount[f.category] !== undefined) catCount[f.category]++;
    });
    const maxCount = Math.max(1, ...Object.values(catCount));
    document.getElementById('categoryChart').innerHTML = CATEGORIES.map(c => `
      <div class="cat-bar">
        <div class="cat-name"><span>${c}</span><span>${catCount[c]}条</span></div>
        <div class="bar"><div class="fill" style="width:${(catCount[c]/maxCount*100)}%"></div></div>
      </div>
    `).join('');

    const filterCat = document.getElementById('filterCategory');
    filterCat.innerHTML = '<option value="">全部分类</option>' + CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

    renderFeedbackList();
  } catch (err) {
    console.error(err);
    list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>加载失败：${escapeHtml(err.message)}</div></div>`;
  }
}

function renderFeedbackList() {
  let feedbacks = [...allFeedbacks];
  const filterCat = document.getElementById('filterCategory').value;
  const filterState = document.getElementById('filterState').value;
  const filterMonth = document.getElementById('filterMonth').value;

  if (filterCat) feedbacks = feedbacks.filter(f => f.category === filterCat);
  if (filterState) feedbacks = feedbacks.filter(f => f.state === filterState);
  if (filterMonth) feedbacks = feedbacks.filter(f => formatDateShort(f.createdAt) === filterMonth);

  const list = document.getElementById('feedbackList');
  if (feedbacks.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无反馈记录</div></div>';
    return;
  }

  list.innerHTML = feedbacks.map(f => `
    <div class="feedback-item ${f.state === 'closed' ? 'closed' : ''}">
      <div class="meta">
        <span>#${f.id} · ${formatDate(f.createdAt)} <span class="${f.state === 'open' ? 'status-open' : 'status-closed'}">${f.state === 'open' ? '待处理' : '已处理'}</span></span>
        <span class="tag">${f.category}</span>
      </div>
      <div class="content">${escapeHtml(f.description)}</div>
      ${f.images.length > 0 ? `<div class="files">${f.images.map(img => `<img src="${img}" onclick="openMedia('${img}')">`).join('')}</div>` : ''}
      ${f.state === 'open' ? `<div style="margin-top:8px;"><button style="font-size:12px;color:var(--success);background:none;border:none;cursor:pointer;" onclick="closeFeedbackItem(${f.id})">✅ 标记已处理</button></div>` : ''}
    </div>
  `).join('');
}

async function closeFeedbackItem(id) {
  if (!confirm('确定标记为已处理？')) return;
  try {
    await closeIssue(id);
    showToast('✅ 已标记为已处理', 'success');
    await renderAdminPanel();
  } catch (err) {
    showToast('操作失败：' + err.message);
  }
}

async function clearAll() {
  const openItems = allFeedbacks.filter(f => f.state === 'open');
  if (openItems.length === 0) { showToast('没有待处理的反馈'); return; }
  if (!confirm(`⚠️ 确定关闭所有 ${openItems.length} 条待处理反馈？`)) return;
  try {
    for (const item of openItems) await closeIssue(item.id);
    showToast(`✅ 已处理 ${openItems.length} 条反馈`, 'success');
    await renderAdminPanel();
  } catch (err) {
    showToast('操作失败：' + err.message);
  }
}

// ==================== 媒体预览 ====================
function openMedia(dataUrl) {
  document.getElementById('mediaContent').innerHTML = `<img src="${dataUrl}" style="max-width:100%;max-height:80vh;">`;
  document.getElementById('mediaModal').classList.remove('hidden');
}
function closeMedia() {
  document.getElementById('mediaModal').classList.add('hidden');
  document.getElementById('mediaContent').innerHTML = '';
}

// ==================== 导出报告 ====================
function exportReport() {
  const feedbacks = allFeedbacks.filter(f => f.state === 'open');
  const now = new Date();
  const monthStr = `${now.getFullYear()}年${now.getMonth()+1}月`;
  const thisMonth = feedbacks.filter(f => {
    const d = new Date(f.createdAt);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const catCount = {};
  CATEGORIES.forEach(c => catCount[c] = 0);
  thisMonth.forEach(f => { catCount[f.category] = (catCount[f.category] || 0) + 1; });

  let report = `═══════════════════════════\n  小区物业问题反馈月度报告\n  ${monthStr}\n═══════════════════════════\n\n📊 本月统计\n───────────────────────────\n  待处理反馈：${feedbacks.length} 条\n  本月新增：${thisMonth.length} 条\n───────────────────────────\n\n📈 分类分布\n───────────────────────────\n`;
  const max = Math.max(1, ...Object.values(catCount));
  CATEGORIES.forEach(c => {
    report += `  ${c.padEnd(8, '　')} ${'█'.repeat(Math.round(catCount[c] / max * 20))} ${catCount[c]}条\n`;
  });
  report += `\n───────────────────────────\n\n📋 本月反馈详情\n───────────────────────────\n`;
  if (thisMonth.length === 0) { report += '  本月暂无反馈。\n'; }
  else { thisMonth.forEach((f, i) => { report += `\n【${i+1}】${f.category} · ${formatDate(f.createdAt)}\n  ${f.description}\n  ${f.images.length > 0 ? `📎 附件：${f.images.length}张图片` : '📎 无附件'}\n`; }); }
  report += `\n───────────────────────────\n  报告生成时间：${formatDate(Date.now())}\n  本报告由小区业主反馈平台自动生成\n═══════════════════════════\n`;

  document.getElementById('reportContent').textContent = report;
  showPage('report');
}

function copyReport() {
  navigator.clipboard.writeText(document.getElementById('reportContent').textContent)
    .then(() => showToast('✅ 已复制', 'success'))
    .catch(() => showToast('复制失败'));
}

function downloadReport() {
  const blob = new Blob([document.getElementById('reportContent').textContent], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `物业反馈报告_${new Date().getFullYear()}_${new Date().getMonth()+1}.txt`;
  a.click();
  showToast('✅ 报告已下载', 'success');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ version: 2, exportedAt: Date.now(), total: allFeedbacks.length, feedbacks: allFeedbacks }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `业主反馈备份_${formatDateShort(Date.now())}.json`;
  a.click();
  showToast(`✅ 已备份 ${allFeedbacks.length} 条`, 'success');
}
